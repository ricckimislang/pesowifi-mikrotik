<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Piso WiFi Captive Portal</title>
    <meta name="description" content="Simple Piso WiFi captive portal UI (HTML + JS only)." />
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --danger-hover: #dc2626;
        --success: #10b981;
        --radius: 16px;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%}
      body{
        color:var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: var(--bg);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .page {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        flex: 1;
        min-width: 0;
      }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .logo-text {
        color: #fff;
        font-weight: 700;
        font-size: 18px;
      }
      .brand-text h1 {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .brand-text p {
        margin-top: 2px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 400;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status {
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        text-align: right;
        white-space: nowrap;
        padding: 6px 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
      }
      .timer-display {
        text-align: center;
        margin-bottom: 8px;
      }
      .big {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: -2px;
        line-height: 1;
        background: linear-gradient(135deg, var(--text), var(--muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .sub {
        font-size: 14px;
        color: var(--muted);
        font-weight: 400;
      }
      .progress-container {
        margin: 24px 0;
      }
      .progress {
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 999px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #8b5cf6);
        border-radius: 999px;
        transition: width 0.3s ease;
      }
      .btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .btns.secondary {
        margin-top: 12px;
      }
      button {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      button:hover:not(:disabled) {
        background: rgba(255,255,255,0.05);
        border-color: var(--muted);
      }
      button:active:not(:disabled) {
        transform: scale(0.98);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .primary {
        border: none;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: #fff;
      }
      .primary:hover:not(:disabled) {
        background: linear-gradient(135deg, var(--accent-hover), #7c3aed);
      }
      .danger {
        color: #fff;
        border: none;
        background: var(--danger);
      }
      .danger:hover:not(:disabled) {
        background: var(--danger-hover);
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        padding: 20px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal.open { display: flex; }
      .modalCard {
        width: 100%;
        max-width: 380px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .modalHead {
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .modalHead h2 {
        font-size: 15px;
        font-weight: 600;
      }
      .timer-progress {
        width: 100%;
        height: 32px;
        background: rgba(255,255,255,0.1);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 16px;
        position: relative;
      }
      .timer-progress-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--accent), #8b5cf6);
        border-radius: 999px;
        transition: width 1s linear;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .timer-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        z-index: 10;
      }
      .modalBody {
        padding: 24px 20px;
        text-align: center;
      }
      .coin-display {
        font-family: 'Courier New', monospace;
        font-size: 36px;
        font-weight: 700;
        color: var(--accent);
        margin: 12px 0 4px 0;
      }
      .time-display {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .coin-btn {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: 2px dashed var(--border);
        background: rgba(255,255,255,0.02);
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .coin-btn:hover {
        background: rgba(59, 130, 246, 0.1);
        border-color: var(--accent);
      }
      .coin-btn:active {
        transform: scale(0.98);
      }
      .modalFoot {
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 16px 20px;
      }
      .note {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
      }
      .device-info {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .device-info-item {
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }
      .device-info-item .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .device-info-item .value {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: var(--text);
        word-break: break-all;
      }
      .rates-section {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .rates-title {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }
      .rates-list {
        display: grid;
        gap: 8px;
      }
      .rate-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
      }
      .rate-item .coin {
        font-weight: 600;
        font-size: 14px;
      }
      .rate-item .time {
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 480px) {
        .page {
          padding: 16px;
        }
        .card {
          padding: 24px 20px;
        }
        .header {
          margin-bottom: 28px;
          gap: 12px;
        }
        .brand {
          gap: 12px;
        }
        .logo {
          width: 42px;
          height: 42px;
        }
        .brand-text h1 {
          font-size: 16px;
        }
        .brand-text p {
          font-size: 12px;
        }
        .status {
          font-size: 12px;
          padding: 5px 8px;
        }
        .big {
          font-size: 52px;
          letter-spacing: -1.5px;
        }
        .btns {
          gap: 10px;
        }
        button {
          padding: 12px 14px;
          font-size: 13px;
        }
      }

      @media (max-width: 360px) {
        .btns {
          grid-template-columns: 1fr;
        }
        .big {
          font-size: 44px;
        }
        .device-info {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" role="main">
      <section class="card" aria-label="Captive portal">
        <header class="header">
          <div class="brand">
            <div class="logo" id="brandLogo" aria-hidden="true">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.querySelector('.logo-text').style.display='block';" />
            <span class="logo-text" style="display:none;">YW</span>
          </div>
            <div class="brand-text">
              <h1 id="brandName"></h1>
              <p id="brandSub">Insert coin to start</p>
            </div>
          </div>
          <div class="status" id="statusText">Waiting for coin</div>
        </header>

        <div class="timer-display">
          <div class="big" id="timeRemaining">00:00</div>
          <p class="sub" id="usedTotal">00:00 / 00:00</p>
        </div>

        <div class="progress-container">
          <div class="progress" aria-label="Progress"><div class="bar" id="progressBar"></div></div>
        </div>

        <div class="btns">
          <button class="primary" id="insertCoinBtn" type="button">Insert Coin</button>
          <button id="pauseResumeBtn" type="button" disabled>Pause</button>
        </div>
        <div class="btns secondary">
          <button class="danger" id="resetBtn" type="button">Reset</button>
        </div>

        <div class="rates-section">
          <div class="rates-title">WiFi Rates</div>
          <div class="rates-list" id="ratesList">
            <div class="rate-item">
              <span class="coin">₱5</span>
              <span class="time">15 minutes</span>
            </div>
            <div class="rate-item">
              <span class="coin">₱10</span>
              <span class="time">30 minutes</span>
            </div>
            <div class="rate-item">
              <span class="coin">₱20</span>
              <span class="time">1 hour 15 minutes</span>
            </div>
            <div class="rate-item">
              <span class="coin">₱50</span>
              <span class="time">4 hours</span>
            </div>
          </div>
        </div>

        <div class="device-info">
          <div class="device-info-item">
            <div class="label">MAC Address</div>
            <div class="value" id="macAddress">--:--:--:--:--:--</div>
          </div>
          <div class="device-info-item">
            <div class="label">IP Address</div>
            <div class="value" id="ipAddress">---.---.---.---</div>
          </div>
        </div>

        <p class="note">UI only (no backend). Time is calculated based on coins inserted.</p>
      </section>
    </main>

    <div class="modal" id="coinModal" role="dialog" aria-modal="true">
      <div class="modalCard">
        <div class="modalHead">
          <h2>Insert Coin</h2>
        </div>
        <div class="timer-progress">
          <div class="timer-progress-bar" id="timerProgressBar"></div>
          <span class="timer-text" id="timerText">60s</span>
        </div>
        <div class="modalBody">
          <div class="coin-display" id="coinAmount">₱0.00</div>
          <div class="time-display" id="coinTime">0 minutes</div>
          <button class="coin-btn" id="insertCoinBtnModal">🪙 Insert Coin (₱5)</button>
        </div>
        <div class="modalFoot">
          <button id="cancelCoinBtn" type="button">Cancel</button>
          <button class="primary" id="confirmCoinBtn" type="button">Confirm</button>
        </div>
      </div>
    </div>

    <script src="./portal.js"></script>
  </body>
</html>
